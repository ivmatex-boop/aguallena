<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor · Aguallena</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#0a0e1a;color:#e8f0fe;min-height:100vh;padding:20px;}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #1e2d42;}
.title{font-size:20px;font-weight:800;color:#00d4ff;}
.live{display:flex;align-items:center;gap:6px;font-size:12px;color:#00ff88;}
.dot{width:8px;height:8px;border-radius:50%;background:#00ff88;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:20px;}
.kpi{background:#111827;border:1px solid #1e2d42;border-radius:12px;padding:14px;text-align:center;}
.kv{font-size:28px;font-weight:800;font-family:monospace;line-height:1;}
.kl{font-size:11px;color:#6b7a99;text-transform:uppercase;letter-spacing:.06em;margin-top:4px;}
.kpi.blue .kv{color:#00d4ff;}.kpi.green .kv{color:#00ff88;}.kpi.orange .kv{color:#ff6b35;}
.prog{background:#1e2d42;border-radius:99px;height:8px;margin-bottom:20px;overflow:hidden;}
.progf{background:linear-gradient(90deg,#1d4ed8,#00d4ff);height:8px;border-radius:99px;transition:width .6s;}
.sec{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#6b7a99;margin-bottom:10px;}
.cobros{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.cobro{background:#111827;border-radius:10px;padding:12px;text-align:center;border:1px solid #1e2d42;}
.cv{font-size:18px;font-weight:800;font-family:monospace;}
.cl{font-size:10px;color:#6b7a99;margin-top:2px;}
.cobro.ef .cv{color:#00ff88;}.cobro.tar .cv{color:#00d4ff;}.cobro.pag .cv{color:#a78bfa;}
.stops{display:flex;flex-direction:column;gap:6px;}
.srow{background:#111827;border:1px solid #1e2d42;border-radius:8px;padding:10px 14px;display:flex;align-items:center;gap:12px;font-size:13px;}
.srow.done{opacity:.5;border-color:#00ff88;}
.srow.noentr{opacity:.5;border-color:#ff4757;}
.snum{font-family:monospace;font-size:13px;color:#6b7a99;min-width:24px;}
.sname{flex:1;font-weight:600;}
.spago{font-size:11px;font-weight:700;margin-left:auto;}
.spago.ef{color:#00ff88;}.spago.tar{color:#00d4ff;}.spago.pag{color:#a78bfa;}.spago.pend{color:#ff6b35;}
.shora{font-family:monospace;font-size:11px;color:#6b7a99;margin-left:8px;}
.updated{font-size:11px;color:#1e2d42;text-align:center;margin-top:16px;}
.export-btns{display:flex;gap:10px;margin-top:16px;}
.ebtn{flex:1;padding:12px;border:none;border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
.epdf{background:#ff6b35;color:white;}.exls{background:#00ff88;color:#000;}
.nodata{text-align:center;padding:40px;color:#6b7a99;font-size:14px;}
</style>
</head>
<body>

<div class="hdr">
  <div class="title">👁 Supervisor · Aguallena</div>
  <div class="live"><div class="dot"></div>En directo</div>
</div>

<div class="kpis">
  <div class="kpi blue"><div class="kv" id="kParada">—</div><div class="kl">Parada actual</div></div>
  <div class="kpi green"><div class="kv" id="kPct">—</div><div class="kl">Completado</div></div>
  <div class="kpi green"><div class="kv" id="kCobrado">—</div><div class="kl">Total cobrado</div></div>
  <div class="kpi orange"><div class="kv" id="kPendiente">—</div><div class="kl">Pendiente</div></div>
</div>

<div class="prog"><div class="progf" id="progFill" style="width:0%"></div></div>

<div class="sec">Desglose cobros</div>
<div class="cobros">
  <div class="cobro ef"><div class="cv" id="totEf">0€</div><div class="cl">💵 Efectivo</div></div>
  <div class="cobro tar"><div class="cv" id="totTar">0€</div><div class="cl">💳 Tarjeta</div></div>
  <div class="cobro pag"><div class="cv" id="totPag">0€</div><div class="cl">✅ Ya pagado</div></div>
</div>

<div class="sec">Paradas</div>
<div id="stopList"><div class="nodata">Cargando...</div></div>

<div class="export-btns">
  <button class="ebtn epdf" onclick="exportPDF()">📄 PDF</button>
  <button class="ebtn exls" onclick="exportExcel()">📊 Excel</button>
</div>

<div class="updated" id="updatedAt"></div>

<script>
var FB = 'https://aguallena-rutas-default-rtdb.europe-west1.firebasedatabase.app/ruta.json';
var lastData = null;

function fmt(n){ return (n||0).toFixed(2).replace('.',',')+'\u20ac'; }
function fmtH(iso){ if(!iso)return''; return new Date(iso).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'}); }
function g(id){ return document.getElementById(id); }

function actualizar(){
  fetch(FB+'?t='+Date.now())
    .then(function(r){return r.json();})
    .then(function(d){
      lastData = d;
      if(!d||!d.activa){
        g('stopList').innerHTML='<div class="nodata">No hay ruta activa ahora mismo.</div>';
        g('kParada').textContent='—';g('kPct').textContent='—';
        g('kCobrado').textContent='—';g('kPendiente').textContent='—';
        return;
      }
      var actual=d.paradaActual||0,total=d.total||0,pct=total>0?Math.round(actual/total*100):0;
      g('kParada').textContent=actual+' / '+total;
      g('kPct').textContent=pct+'%';
      g('progFill').style.width=pct+'%';
      var paradas=d.paradas||[];
      var tEf=d.totEfectivo||0,tTar=d.totTarjeta||0,tPag=d.totPagado||0,tCob=d.totalCobrado||0;
      var totRuta=paradas.reduce(function(s,p){return s+(p.cobrar||0);},0);
      g('kCobrado').textContent=fmt(tCob);
      g('kPendiente').textContent=fmt(totRuta-tCob);
      g('totEf').textContent=fmt(tEf);
      g('totTar').textContent=fmt(tTar);
      g('totPag').textContent=fmt(tPag);
      if(paradas.length===0){
        g('stopList').innerHTML='<div class="nodata">⚠️ Genera la ruta desde el gestor para ver el detalle.</div>';
      } else {
        var html='';
        paradas.forEach(function(p,i){
          var cls='srow'+(p.noEntregado?' noentr':p.entregado?' done':'');
          var pagoC=p.noEntregado?'pend':p.pago==='efectivo'?'ef':p.pago==='tarjeta'?'tar':p.entregado?'pag':'pend';
          var pagoT=p.noEntregado?'❌ No entregado':p.pago==='efectivo'?'💵 Efectivo':p.pago==='tarjeta'?'💳 Tarjeta':p.entregado?'✅ Ya pagado':'⏳ Pendiente';
          html+='<div class="'+cls+'"><span class="snum">'+(i+1)+'</span><span class="sname">'+(p.name||'—')+'</span><span class="spago '+pagoC+'">'+pagoT+'</span><span class="shora">'+fmtH(p.hora)+'</span></div>';
        });
        g('stopList').innerHTML=html;
      }
      if(d.ultimaActualizacion){
        var dt=new Date(d.ultimaActualizacion);
        g('updatedAt').textContent='Última actualización: '+dt.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
      }
    }).catch(function(){g('updatedAt').textContent='Sin conexión con Firebase';});
}

function exportPDF(){
  if(!lastData||!lastData.paradas)return;
  var d=lastData, paradas=d.paradas||[];
  var filas=paradas.map(function(p,i){
    var col=p.noEntregado?'#dc2626':p.pago==='efectivo'?'#166534':p.pago==='tarjeta'?'#1e40af':'#5b21b6';
    var lbl=p.noEntregado?'❌ No entregado':p.pago==='efectivo'?'💵 Efectivo':p.pago==='tarjeta'?'💳 Tarjeta':p.entregado?'✅ Ya pagado':'⏳ Pendiente';
    return '<tr><td>'+(i+1)+'</td><td><strong>'+(p.name||'')+'</strong></td><td style="font-size:10px">'+(p.addr||'')+'</td><td style="font-size:10px">'+(p.productos||'')+'</td><td style="text-align:right;font-family:monospace">'+((p.cobrar||0).toFixed(2))+'€</td><td style="color:'+col+';font-weight:700">'+lbl+'</td><td style="font-family:monospace;font-size:10px">'+fmtH(p.hora)+'</td></tr>';
  }).join('');
  var html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Informe Aguallena</title><style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px}h1{font-size:17px;color:#1d4ed8;margin-bottom:4px}.sub{color:#666;margin-bottom:16px}table{width:100%;border-collapse:collapse;margin-bottom:16px}th{background:#1d4ed8;color:#fff;padding:6px 8px;text-align:left;font-size:10px;text-transform:uppercase}td{padding:5px 8px;border-bottom:1px solid #e5e7eb}tr:nth-child(even) td{background:#f9fafb}.totbox{background:#f0fdf4;border:2px solid #16a34a;border-radius:8px;padding:14px;max-width:280px;margin-left:auto}.trow{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #dcfce7;font-size:12px}.trow:last-child{border:none;font-weight:700;font-size:14px}.pbtn{float:right;padding:7px 16px;background:#1d4ed8;color:#fff;border:none;border-radius:6px;cursor:pointer}@media print{.pbtn{display:none}}</style></head><body>'
    +'<button class="pbtn" onclick="window.print()">🖨️ Imprimir</button>'
    +'<h1>💧 Informe Ruta · Aguallena</h1>'
    +'<div class="sub">Fecha: '+(d.fecha||'')+' · '+(d.entregadas||0)+' entregas · Total: '+fmt(d.totalCobrado)+'</div>'
    +'<table><thead><tr><th>#</th><th>Cliente</th><th>Dirección</th><th>Productos</th><th>Importe</th><th>Pago</th><th>Hora</th></tr></thead><tbody>'+filas+'</tbody></table>'
    +'<div class="totbox"><div class="trow"><span>💵 Efectivo</span><span>'+fmt(d.totEfectivo)+'</span></div><div class="trow"><span>💳 Tarjeta</span><span>'+fmt(d.totTarjeta)+'</span></div><div class="trow"><span>✅ Ya pagado</span><span>'+fmt(d.totPagado)+'</span></div><div class="trow"><span>TOTAL</span><span>'+fmt(d.totalCobrado)+'</span></div></div>'
    +'</body></html>';
  var w=window.open('','_blank');if(w){w.document.write(html);w.document.close();}
}

function exportExcel(){
  if(!lastData||!lastData.paradas)return;
  if(typeof XLSX==='undefined'){
    var s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=function(){generarXLS();};
    document.head.appendChild(s);
  } else {generarXLS();}
}

function generarXLS(){
  var d=lastData, paradas=d.paradas||[];
  var wb=XLSX.utils.book_new();
  var ws=[['#','Cliente','Dirección','Productos','Importe','Pago','Hora','Estado']];
  paradas.forEach(function(p,i){ws.push([i+1,p.name||'',p.addr||'',p.productos||'',p.cobrar||0,p.pago||'',fmtH(p.hora),p.noEntregado?'No entregado':p.entregado?'Entregado':'Pendiente']);});
  ws.push([],[' ',' ',' ',' ','Efectivo',d.totEfectivo||0,' ',''],[' ',' ',' ',' ','Tarjeta',d.totTarjeta||0,' ',''],[' ',' ',' ',' ','Ya pagado',d.totPagado||0,' ',''],[' ',' ',' ',' ','TOTAL',d.totalCobrado||0,' ','']);
  var sheet=XLSX.utils.aoa_to_sheet(ws);
  sheet['!cols']=[{wch:4},{wch:22},{wch:30},{wch:30},{wch:10},{wch:12},{wch:8},{wch:14}];
  XLSX.utils.book_append_sheet(wb,sheet,'Ruta '+(d.fecha||''));
  XLSX.writeFile(wb,'informe_ruta_'+(d.fechaISO||new Date().toISOString().slice(0,10))+'.xlsx');
}

actualizar();
setInterval(actualizar,15000);
</script>
</body>
</html>
